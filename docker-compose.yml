version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Postgres with pgvector extension
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: claimshield_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: claimshield
      POSTGRES_USER: claimshield
      POSTGRES_PASSWORD: claimshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claimshield -d claimshield"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — caching, rate-limiting, workflow state
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: claimshield_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
